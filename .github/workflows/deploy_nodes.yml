name: "Deploy nodes"

permissions: { }

on:
  workflow_dispatch:
    inputs:
      arch:
        required: true
        type: choice
        description: "Machine architecture (amd64, arm64)"
        default: "amd64"
        options:
          - amd64
          - arm64

jobs:
  deploy:
    name: deploy-node
    strategy:
      matrix:
        network: [ stagenet, testnet, mainnet ]
        arch: [ "${{ inputs.arch }}" ]
    uses: "./.github/workflows/deploy_node.yml"
    secrets: inherit
    with:
      network: ${{ matrix.network }}
      arch: ${{ matrix.arch }}
